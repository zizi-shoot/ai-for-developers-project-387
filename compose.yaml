services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "${PORT:?PORT is required}"
    ports:
      - "${PORT:?PORT is required}:${PORT:?PORT is required}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:$${PORT}/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
