name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
  API_PROXY_TARGET: ${{ vars.API_PROXY_TARGET }}

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.22.12
          cache: false

      - name: Run tests
        run: go test ./...

      - name: Run tests with race detector
        run: go test -race ./...

  frontend-tests:
    name: Frontend and TypeSpec tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.20.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.12.0
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: Install TypeSpec dependencies
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Compile TypeSpec contract
        run: pnpm spec:build

      - name: Run unit tests
        run: pnpm --dir frontend test:unit --run

      - name: Build frontend
        run: pnpm --dir frontend build

  e2e-tests:
    name: End-to-end tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.20.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.12.0
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --dir frontend exec playwright install --with-deps chromium firefox webkit

      - name: Build frontend
        run: pnpm --dir frontend build

      - name: Run end-to-end tests
        run: pnpm --dir frontend test:e2e

      - name: Upload Playwright report
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  docker-smoke-tests:
    name: Docker build and smoke test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build and test container
        env:
          PORT: 18080
        run: sh scripts/docker-smoke.sh
